name: Build and deploy Blazor WebAssembly

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore ./LuizaEstate.Web.csproj

      - name: Build
        run: dotnet build ./LuizaEstate.Web.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./LuizaEstate.Web.csproj --configuration Release -o publish --no-build

      - name: Add GitHub Pages SPA fallback
        run: cp ./publish/wwwroot/index.html ./publish/wwwroot/404.html

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish/wwwroot
