name: Build and deploy Astro site

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pages: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose-production:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Inspect GitHub Pages configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: echo "PAGES_CONFIGURATION"; gh api "repos/${GITHUB_REPOSITORY}/pages" --jq '{build_type, source, html_url, cname, status}' || true

      - name: Probe live production
        run: >-
          body=$(mktemp);
          code=$(curl -sS -L --connect-timeout 15 --max-time 60 -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' -o "$body" -w '%{http_code}' "https://luiza.estate/?diagnostic=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}");
          if grep -q 'meta name="generator" content="Astro' "$body"; then stack=astro; elif grep -q '_framework/blazor.webassembly.js' "$body"; then stack=blazor; else stack=unknown; fi;
          echo "PROBE path=/ status=${code} stack=${stack}";
          for path in robots.txt sitemap.xml service-page/ 404.html; do code=$(curl -sS -L --connect-timeout 15 --max-time 60 -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' -o /dev/null -w '%{http_code}' "https://luiza.estate/${path}?diagnostic=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"); echo "PROBE path=/${path} status=${code}"; done

  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
