name: Hero visual check

on:
  pull_request:
    branches:
      - develop
    paths:
      - "src/pages/index.astro"
      - "src/styles/**"
      - ".github/workflows/visual-check.yml"

permissions:
  contents: read

jobs:
  screenshots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Chromium
        run: npx --yes playwright@1.54.1 install --with-deps chromium

      - name: Start local preview
        run: |
          npm run preview -- --host 127.0.0.1 > /tmp/astro-preview.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4321/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/astro-preview.log
          exit 1

      - name: Capture before and after
        run: |
          mkdir -p visual-artifacts
          npx --yes playwright@1.54.1 screenshot --browser=chromium --viewport-size="1440,1200" --full-page https://luiza.estate/ visual-artifacts/before-desktop.png
          npx --yes playwright@1.54.1 screenshot --browser=chromium --viewport-size="390,844" --full-page https://luiza.estate/ visual-artifacts/before-mobile.png
          npx --yes playwright@1.54.1 screenshot --browser=chromium --viewport-size="1440,1200" --full-page http://127.0.0.1:4321/ visual-artifacts/after-desktop.png
          npx --yes playwright@1.54.1 screenshot --browser=chromium --viewport-size="390,844" --full-page http://127.0.0.1:4321/ visual-artifacts/after-mobile.png

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: issue-14-visual-check
          path: visual-artifacts
          if-no-files-found: error
